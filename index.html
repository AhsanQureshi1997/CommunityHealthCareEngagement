<!DOCTYPE html>
<html>
<head>
  <title>Community Engagement Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Community Engagement Dashboard</h1>
  <p>Population-level outreach, engagement, and intervention tracking</p>
</header>

<div class="container">

<div class="controls">
<button onclick="loadDemo()">Load Demo Data</button>
<input type="file" id="fileInput">
<button onclick="filterHigh()">Show High Risk</button>
<button onclick="showAll()">Show All</button>
</div>

<div id="summary"></div>

<canvas id="chart" width="600" height="250"></canvas>

<table id="table">
<thead>
<tr>
<th>Patient</th>
<th>Program</th>
<th>Status</th>
<th>Days Since Contact</th>
<th>Attempts</th>
<th>Risk</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="script.js"></script>
</body>
</html>
